<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | ComplianceOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#030712;--surface:#0f172a;--border:#334155;
  --accent:#3b82f6;--accent2:#8b5cf6;--text:#f8fafc;--muted:#94a3b8;
  --grad:linear-gradient(135deg,#3b82f6,#8b5cf6);
}
body {
  background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
  margin: 0; display: flex; height: 100vh; overflow: hidden;
}
.sidebar {
  width: 260px; background: rgba(15,23,42,0.8); border-right: 1px solid var(--border);
  padding: 30px; display: flex; flex-direction: column; backdrop-filter: blur(20px);
}
.logo { font-weight: 800; font-size: 1.25rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
.nav-item {
  padding: 12px 16px; border-radius: 12px; color: var(--muted); cursor: pointer; transition: 0.3s;
  font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center;
}
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { border: 1px solid var(--border); }

main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(59,130,246,0.05), transparent); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px;
}
.stat-card h4 { margin: 0; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.stat-card .value { font-size: 2rem; font-weight: 800; margin-top: 8px; }

.charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.chart-container {
  background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px;
}

.status-badge {
  padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
  background: rgba(34,197,94,0.1); color: #22c55e;
}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">ComplianceOS Admin</div>
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item">Tenants</div>
  <div class="nav-item">Users</div>
  <div class="nav-item">AI Logs</div>
  <div class="nav-item">Settings</div>
</div>

<main>
  <div class="header">
    <div>
      <h1 style="margin:0; font-weight:800; letter-spacing:-1px">System Overview</h1>
      <p style="color:var(--muted); margin:4px 0 0 0">Control room for production intelligence</p>
    </div>
    <div class="status-badge">● SYSTEM OPERATIONAL</div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <h4>Total Tenants</h4>
      <div class="value" id="totalTenants">0</div>
    </div>
    <div class="stat-card">
      <h4>Total Reports</h4>
      <div class="value" id="totalReports">0</div>
    </div>
    <div class="stat-card">
      <h4>Active Users</h4>
      <div class="value" id="totalUsers">0</div>
    </div>
    <div class="stat-card">
      <h4>Vector Nodes</h4>
      <div class="value" id="totalNodes">0</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-container">
      <h3 style="margin-top:0">Compliance Velocity</h3>
      <canvas id="velocityChart" height="150"></canvas>
    </div>
    <div class="chart-container">
      <h3 style="margin-top:0">Risk Mix</h3>
      <canvas id="riskChart"></canvas>
    </div>
  </div>
</main>

<script>
const token = localStorage.getItem('cos_token');
// Only allow admins (simplified check for demo, real check in backend)
const user = JSON.parse(localStorage.getItem('cos_user') || '{}');
if (!token || user.role !== 'admin') {
  // window.location.href = '/login.html'; 
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    
    document.getElementById('totalReports').innerText = data.total_reports;
    document.getElementById('totalUsers').innerText = data.total_users;
    document.getElementById('totalNodes').innerText = data.vector_db.count || 0;
    document.getElementById('totalTenants').innerText = data.active_tenants || 0;

    // Optional: add a revenue tracker if we add a card for it
    if (data.revenue) {
       console.log("Monthly Recurring Revenue: " + data.revenue.total_mrr);
    }

    renderCharts(data);
  } catch (err) {
    console.error("Failed to load admin stats");
  }
}

function renderCharts(data) {
  const ctxV = document.getElementById('velocityChart').getContext('2d');
  new Chart(ctxV, {
    type: 'line',
    data: {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
      datasets: [{
        label: 'Analyses conducted',
        data: [12, 19, 15, 25, 32, 28, 45],
        borderColor: '#3b82f6',
        tension: 0.4,
        fill: true,
        backgroundColor: 'rgba(59,130,246,0.1)'
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { grid: { color: '#334155' } } }
    }
  });

  const ctxR = document.getElementById('riskChart').getContext('2d');
  new Chart(ctxR, {
    type: 'doughnut',
    data: {
      labels: ['High', 'Medium', 'Low'],
      datasets: [{
        data: [data.risk_distribution.high, data.risk_distribution.medium, data.risk_distribution.low],
        backgroundColor: ['#ef4444', '#f59e0b', '#22c55e'],
        borderWidth: 0
      }]
    },
    options: {
      cutout: '80%',
      plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
    }
  });
}

loadStats();
gsap.from(".stat-card", { opacity: 0, scale: 0.9, stagger: 0.1, duration: 0.6, ease: "power4.out" });
gsap.from(".chart-container", { opacity: 0, y: 20, stagger: 0.2, duration: 1, delay: 0.3 });
</script>
</body>
</html>
