<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password | ComplianceOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#030712;--surface:#0f172a;--border:#334155;
  --accent:#3b82f6;--accent2:#8b5cf6;--text:#f8fafc;--muted:#94a3b8;
  --grad:linear-gradient(135deg,#3b82f6,#8b5cf6);
}
body {
  background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
  height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
}
.bg-grid {
  position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 80px 80px; opacity: 0.1; pointer-events: none;
}
.login-card {
  width: 100%; max-width: 400px; background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; z-index: 10;
}
h1 { font-size: 1.75rem; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
p.subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
input {
  width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
}
input:focus { border-color: var(--accent); }
.btn {
  width: 100%; padding: 16px; background: var(--grad); border: none; border-radius: 12px;
  color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px;
}
.success-msg { color: #22c55e; text-align: center; display: none; }
.links { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted); }
.links a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="login-card">
  <h1>Recover Access</h1>
  <p class="subtitle">We'll send you a secure reset link</p>
  
  <div id="successMsg" class="success-msg">
    <p>Success! Please check your email inbox for the reset link.</p>
    <a href="/login.html" style="color:var(--accent); text-decoration:none; font-weight:700;">Back to Login</a>
  </div>

  <form id="forgotForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="name@company.com" required/>
    </div>
    <button type="submit" class="btn">Send Reset Link</button>
  </form>
  
  <div class="links">
    <p><a href="/login.html">Wait, I remember it!</a></p>
  </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  
  try {
    const res = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    // Always show success to prevent email enumeration
    document.getElementById('forgotForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
    
  } catch (err) {
    alert("An error occurred. Please try again later.");
  }
});
</script>
</body>
</html>
